name: VPS-15Phut-Tu-Nhan-Dien
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vps-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: 1. Setup & Restore
        shell: powershell
        run: |
          choco install tailscale -y --no-progress
          if (!(Test-Path "C:\Backup")) { New-Item -ItemType Directory -Path "C:\Backup" }
          # Tạo folder lưu "linh hồn" của Tailscale để giữ IP
          if (!(Test-Path "C:\Backup\TS_State")) { New-Item -ItemType Directory -Path "C:\Backup\TS_State" }

      - name: 2. Download Last State
        uses: actions/download-artifact@v4
        with:
          name: vps-data-15m
          path: C:\Backup
        continue-on-error: true

      - name: 3. Restore Identity & Start Tailscale
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Phục hồi file định danh cũ nếu có để giữ đúng IP
          $TS_DATA = "$env:ProgramData\Tailscale"
          if (Test-Path "C:\Backup\TS_State\*.log") {
              Copy-Item -Path "C:\Backup\TS_State\*" -Destination $TS_DATA -Recurse -Force
          }
          
          Start-Service tailscale
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=vps-15m-fixed --accept-routes --reset --force-reauth --unattended --accept-dns=false
          
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Chạy & Đợi (12 Phút)
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if (Test-Path "C:\Backup\auto_start.ps1") {
              powershell.exe -ExecutionPolicy Bypass -File "C:\Backup\auto_start.ps1"
          }

          $wait = 12 # Chạy 12 phút, dành 3 phút cuối để dọn dẹp và backup
          for ($i=1; $i -le $wait; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i/$wait phut..."
              if ($i -eq 10) { 
                  gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"
              }
          }

      - name: 5. Dọn dẹp & Ép ghi dữ liệu (Sync)
        shell: powershell
        if: always()
        run: |
          Write-Host "Dang chuan bi sao luu..."
          # Dừng Tailscale để copy file định danh IP an toàn
          Stop-Service tailscale -ErrorAction SilentlyContinue
          Copy-Item -Path "$env:ProgramData\Tailscale\*" -Destination "C:\Backup\TS_State" -Recurse -Force
          
          # Lệnh quan trọng: Ép Windows ghi mọi dữ liệu từ RAM xuống ổ cứng ngay lập tức
          [System.IO.Directory]::GetFiles("C:\Backup") | ForEach-Object { [System.IO.File]::OpenWrite($_).Close() }
          Write-Host "Da ep ghi du lieu xong."

      - name: 6. Save State (Upload Artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps-data-15m
          path: C:\Backup\
          retention-days: 1
          overwrite: true
