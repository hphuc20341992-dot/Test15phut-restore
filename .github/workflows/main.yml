name: VPS-15Phut-Tu-Nhan-Dien
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vps-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: 1. Setup & Restore Folder
        shell: powershell
        run: |
          # Cài đặt Tailscale nhưng chưa chạy service ngay
          choco install tailscale -y --no-progress
          if (!(Test-Path "C:\Backup")) { New-Item -ItemType Directory -Path "C:\Backup" }
          # Tạo sẵn folder chứa cấu hình Tailscale để giữ IP
          if (!(Test-Path "C:\Backup\TailscaleState")) { New-Item -ItemType Directory -Path "C:\Backup\TailscaleState" }

      - name: 2. Download Last State (Bao gồm IP cũ)
        uses: actions/download-artifact@v4
        with:
          name: vps-data-15m
          path: C:\Backup
        continue-on-error: true

      - name: 3. Restore IP & Start Tailscale
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Sao chép dữ liệu cấu hình cũ vào hệ thống trước khi start
          $TS_PATH = "$env:ProgramData\Tailscale"
          if (Test-Path "C:\Backup\TailscaleState\*.log") {
              Write-Host "Dang phuc hoi danh tinh IP cu..."
              Copy-Item -Path "C:\Backup\TailscaleState\*" -Destination $TS_PATH -Recurse -Force
          }
          
          Start-Service tailscale
          
          # Lệnh UP này sẽ nhận diện lại máy cũ nếu đã có file cấu hình
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=vps-15m-fixed --accept-routes --reset --unattended --accept-dns=false
          
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Chạy nối đầu & Phục hồi App
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if (Test-Path "C:\Backup\auto_start.ps1") {
              powershell.exe -ExecutionPolicy Bypass -File "C:\Backup\auto_start.ps1"
          }

          $wait = 12
          for ($i=1; $i -le $wait; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i/$wait phut..."
              if ($i -eq 10) { 
                  Write-Host "Dang tu dong kich hoat phien moi..."
                  gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"
              }
          }

      - name: 5. Save State & IP Identity
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps-data-15m
          path: C:\Backup\
          retention-days: 1
          overwrite: true

      - name: 5b. Backup Tailscale Identity (Chạy trước khi tắt máy)
        shell: powershell
        if: always()
        run: |
          # Copy "linh hồn" của máy (IP) vào thư mục Backup để máy sau dùng
          Stop-Service tailscale
          Copy-Item -Path "$env:ProgramData\Tailscale\*" -Destination "C:\Backup\TailscaleState" -Recurse -Force
