name: VPS-15Phut-Tu-Nhan-Dien
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vps-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: 1. Setup & Restore
        shell: powershell
        run: |
          choco install tailscale -y --no-progress
          Start-Service tailscale
          if (!(Test-Path "C:\Backup")) { New-Item -ItemType Directory -Path "C:\Backup" }

      - name: 2. Download Last State
        uses: actions/download-artifact@v4
        with:
          name: vps-data-15m
          path: C:\Backup
        continue-on-error: true

      - name: 3. Start Tailscale (Giữ nguyên IP cũ)
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Thêm lệnh --force-reauth để nó đá máy cũ ra và chiếm lấy Hostname + IP đó
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=vps-15m-fixed --accept-routes --reset --force-reauth
          
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Chạy nối đầu & Phục hồi App
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if (Test-Path "C:\Backup\auto_start.ps1") {
              powershell.exe -ExecutionPolicy Bypass -File "C:\Backup\auto_start.ps1"
          }

          $wait = 15
          for ($i=1; $i -le $wait; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i/$wait phut..."
              if ($i -eq 13) { 
                  Write-Host "Dang tu dong kich hoat phien moi..."
                  gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"
              }
          }

      - name: 5. Save State
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps-data-15m
          path: C:\Backup
          retention-days: 1
