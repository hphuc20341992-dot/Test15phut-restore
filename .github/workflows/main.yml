name: VPS-15Phut-Chuan-IP-Data
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vps-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: 1. Khoi tao Folder
        run: |
          if (!(Test-Path "C:\Backup")) { New-Item -ItemType Directory -Path "C:\Backup" }
          # Folder nay rat quan trong de giu IP
          if (!(Test-Path "C:\Backup\TS_State")) { New-Item -ItemType Directory -Path "C:\Backup\TS_State" }

      - name: 2. Download Data & Identity
        uses: actions/download-artifact@v4
        with:
          name: vps-data-15m
          path: C:\DataDownload # Tai vao folder tam
        continue-on-error: true

      - name: 3. Phuc hoi File & Danh tinh IP
        run: |
          # Sua loi long folder cua GitHub Artifact
          if (Test-Path "C:\DataDownload\Backup") {
              Copy-Item -Path "C:\DataDownload\Backup\*" -Destination "C:\Backup\" -Recurse -Force
          } elseif (Test-Path "C:\DataDownload") {
              Copy-Item -Path "C:\DataDownload\*" -Destination "C:\Backup\" -Recurse -Force
          }
          
          # Phuc hoi "linh hon" Tailscale truoc khi cai dat
          $TS_CONFIG_PATH = "$env:ProgramData\Tailscale"
          if (Test-Path "C:\Backup\TS_State\server.state") {
              if (!(Test-Path $TS_CONFIG_PATH)) { New-Item -ItemType Directory -Path $TS_CONFIG_PATH }
              Copy-Item -Path "C:\Backup\TS_State\*" -Destination $TS_CONFIG_PATH -Recurse -Force
              Write-Host "Da phuc hoi danh tinh IP cu thành cong."
          }

      - name: 4. Cai dat & Start Tailscale (Giu IP)
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          choco install tailscale -y --no-progress
          Start-Service tailscale
          # Dung --force-reauth de "da" may cu dang treo ra khoi IP do
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=vps-15m-fixed --accept-routes --reset --force-reauth --unattended --accept-dns=false
          
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 5. Auto Start App & Duy tri 12 Phut
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if (Test-Path "C:\Backup\auto_start.ps1") {
              powershell.exe -ExecutionPolicy Bypass -File "C:\Backup\auto_start.ps1"
          }
          $wait = 12
          for ($i=1; $i -le $wait; $i++) {
              Start-Sleep -Seconds 60
              if ($i -eq 10) { gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY" }
          }

      - name: 6. Luu danh tinh IP & Backup Data
        if: always()
        run: |
          # Dung service de copy file state cua Tailscale khong bi loi "dang su dung"
          Stop-Service tailscale -Force
          Start-Sleep -Seconds 5
          Copy-Item -Path "$env:ProgramData\Tailscale\*" -Destination "C:\Backup\TS_State" -Recurse -Force
          
          # Upload artifact tu folder Backup
          Write-Host "Dang sao luu toan bo du lieu..."

      - name: 7. Final Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps-data-15m
          path: C:\Backup # KHONG co dau gạch chéo ở đây
          retention-days: 1
          overwrite: true
