name: VPS-15Phut-Tu-Nhan-Dien
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  vps-run:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: 1. Setup & Restore
        shell: powershell
        run: |
          Write-Host "Dang chuan bi moi truong..."
          choco install tailscale -y --no-progress
          Start-Service tailscale
          if (!(Test-Path "C:\Backup")) { New-Item -ItemType Directory -Path "C:\Backup" }

      - name: 2. Download Last State
        uses: actions/download-artifact@v4
        with:
          name: vps-data-15m
          path: C:\Backup
        continue-on-error: true

      - name: 3. Start Tailscale (Fixed IP)
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Hostname co dinh giup giu nguyen IP tren Tailscale
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=vps-15m-fixed --accept-routes --reset
          
          net user runneradmin "Phuc1993"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 4. Chạy nối đầu (Tu nhan dien file)
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $wait = 15
          Write-Host "Duy tri trong $wait phut..."
          for ($i=1; $i -le $wait; $i++) {
              Start-Sleep -Seconds 60
              Write-Host "Uptime: $i/$wait phut..."
              
              # Kich hoat phien moi o phut thu 13
              if ($i -eq 13) { 
                  Write-Host "Dang tu dong kich hoat phien moi (Self-Chain)..."
                  # Su dung bien moi truong de lay dung ten Workflow dang chay
                  gh workflow run "$env:GITHUB_WORKFLOW" --repo "$env:GITHUB_REPOSITORY"
              }
          }

      - name: 5. Save State
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vps-data-15m
          path: C:\Backup
          retention-days: 1

      - name: 6. Ket thuc ban giao
        shell: powershell
        run: Start-Sleep -Seconds 30
